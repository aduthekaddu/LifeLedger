services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeledger-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifeledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lifeledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeledger-api
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lifeledger
      JWT_SECRET: local-dev-secret-change-before-real-use-64-characters-long
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      UPLOAD_DIR: /app/private-uploads
      MAX_FILE_SIZE_BYTES: 10485760
      EMERGENCY_ACCESS_TTL_MINUTES: 120
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/private-uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifeledger-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
